<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px 40px;
            text-align: center;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            backdrop-filter: blur(10px);
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .skill.level-1 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
        .skill.level-2 { background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%); color: #333; }
        .skill.level-3 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .skill.level-4 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .courses {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .course {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-item {
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .contact-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .contact-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-item a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .header {
                padding: 40px 20px 30px;
            }

            .name {
                font-size: 2em;
            }

            .content {
                padding: 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">L</div>
            <h1 class="name">L</h1>
            <div class="tags">
                <span class="tag">计算机学习者</span>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title">校园背景</h2>
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🏫 学校</h3>
                        <p>电子科技大学成都学院</p>
                    </div>
                    <div class="info-card">
                        <h3>📚 学院</h3>
                        <p>计算机科学学院</p>
                    </div>
                    <div class="info-card">
                        <h3>🎓 专业</h3>
                        <p>软件工程</p>
                    </div>
                    <div class="info-card">
                        <h3>📅 学制</h3>
                        <p>2024级 | 预计2028年毕业</p>
                    </div>
                    <div class="info-card">
                        <h3>🎖️ 学历</h3>
                        <p>本科</p>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">专业技能</h2>
                <h3 style="margin-bottom: 15px; color: #555;">技术类</h3>
                <div class="skills" style="margin-bottom: 20px;">
                    <span class="skill level-4">Python（熟练）</span>
                    <span class="skill level-3">SQL（掌握）</span>
                    <span class="skill level-2">HTML/CSS（基础）</span>
                    <span class="skill level-1">Matlab（了解）</span>
                </div>
                <h3 style="margin-bottom: 15px; color: #555;">非技术类</h3>
                <div class="skills">
                    <span class="skill">文案写作</span>
                    <span class="skill">PPT 制作</span>
                    <span class="skill">英语口语</span>
                    <span class="skill">数据分析</span>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">核心课程</h2>
                <div class="courses">
                    <span class="course">数据结构</span>
                    <span class="course">操作系统</span>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">联系我</h2>
                <div class="contact">
                    <div class="contact-item">
                        <span>📧</span>
                        <a href="mailto:15283426134@163.com">15283426134@163.com</a>
                    </div>
                    <div class="contact-item">
                        <span>💬</span>
                        <span>QQ: 215983273</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 L. Made with ❤️</p>
        </div>
    </div>
</body>
</html>
